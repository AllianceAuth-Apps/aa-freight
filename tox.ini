[flake8]
exclude = .git, *migrations*
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293

[tox]
envlist = {py310, py311, py312}-django{42, 52}, core, pylint

[testenv]
setenv =
    django42: DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local_all
    django52: DJANGO_SETTINGS_MODULE = testauth.settings_aa5.local_all
    core: DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local_core

deps=
    django42: allianceauth>=4,<5
    django52: allianceauth>=5,<6
    !core: discordproxy

extras =
    test

commands_pre=
    pip list

commands=
    coverage run runtests.py -v 2 --exclude-tag=tox_disabled
    coverage xml
    coverage report

[testenv:pylint]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local_all

deps=
    pylint
    pylint-django
    allianceauth>=4,<5
commands=
    pylint --load-plugins pylint_django freight
